<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Weetao</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #9a9aa0;
      --faint: #6a6a72;
      --card: #141418;
      --card-hi: #1b1b20;
      --chip: #1a1a1d;
      --chip-active: #2a2a30;
      --border: #27272c;
      --border-soft: #1f1f24;
      --cta: #f5f5f7;
      --cta-fg: #0a0a0a;
      --accent: #e8c547;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
      --danger: #ff4d4f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--fg); }
    body {
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, Segoe UI, Roboto, Noto Sans, sans-serif;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      padding: 28px 20px 8px;
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .brand p {
      color: var(--fg);
      opacity: .88;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    .lang {
      position: relative;
      user-select: none;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-width: 96px;
      justify-content: space-between;
    }

    .lang-btn:hover { background: #1f1f24; }
    .lang-btn:active { transform: scale(.985); }

    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 220px;
      background: #111114;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px;
      box-shadow: var(--shadow);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 140ms ease, transform 140ms ease;
      max-height: 70vh;
      overflow-y: auto;
    }

    .lang.open .lang-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      color: var(--fg);
      cursor: pointer;
    }

    .lang-item:hover { background: #1b1b20; }
    .lang-item.active { background: #202026; }
    .lang-item .flag { font-size: 18px; line-height: 1; }
    .lang-item .name { font-weight: 600; }

    .filter-rows {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 0 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--faint);
      padding: 0 20px;
      font-weight: 700;
    }

    .filters, .filters-sub {
      padding: 2px 20px 6px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar, .filters-sub::-webkit-scrollbar { display: none; }

    .chip, .chip-sub {
      flex: 0 0 auto;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid var(--border-soft);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 80ms ease;
    }

    .chip {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
    }

    .chip-sub {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      border-style: dashed;
      color: var(--faint);
    }

    .chip:hover, .chip-sub:hover {
      color: var(--fg);
      border-color: #33333a;
      background: #141418;
    }

    .chip.active, .chip-sub.active {
      background: var(--chip-active);
      color: var(--fg);
      border-color: #3a3a42;
    }

    .chip:active, .chip-sub:active { transform: scale(.97); }

    .filters-sub { display: none; }
    .filters-sub.open { display: flex; }

    main {
      padding: 14px 20px 110px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: 22px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .card:hover {
      border-color: var(--border);
      background: var(--card-hi);
    }

    .head {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.4px;
      line-height: 1.2;
    }

    .meta {
      font-size: 11px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      opacity: .95;
    }

    .addr {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .sources {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-top: 4px;
    }

    .src-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-soft);
      gap: 16px;
    }

    .src-row:last-child { border-bottom: none; }

    .src-name {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .2px;
      font-weight: 600;
    }

    .src-name .via {
      display: inline-block;
      margin-left: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--faint);
      letter-spacing: .2px;
      text-transform: lowercase;
    }

    .src-val {
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .src-val .rating {
      font-size: 15px;
      font-weight: 800;
    }

    .src-val .count {
      color: var(--faint);
      font-size: 12px;
      font-weight: 500;
    }

    .src-row.top .src-val .rating { color: var(--accent); }
    .src-row.top .src-name { color: var(--fg); }

    .src-empty {
      padding: 10px 0;
      font-size: 13px;
      color: var(--faint);
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 54px;
      padding: 16px 18px;
      background: var(--cta);
      color: var(--cta-fg);
      border: none;
      border-radius: 16px;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 80ms ease, opacity 140ms ease, box-shadow 160ms ease;
      box-shadow: 0 1px 0 rgba(255,255,255,.12) inset, 0 6px 18px rgba(0, 0, 0, .35);
    }

    .cta:hover { opacity: .96; }
    .cta:active { transform: scale(.985); }
    .cta:focus-visible { outline: 2px solid #7a7a80; outline-offset: 3px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      animation: fadeIn 140ms ease;
    }

    .modal-backdrop.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      width: 100%;
      max-width: 340px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .modal h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 4px;
    }

    .modal-btn {
      width: 100%;
      min-height: 48px;
      padding: 14px 16px;
      background: var(--chip);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .modal-btn:hover {
      background: #1f1f24;
      border-color: #3a3a42;
    }

    .modal-close {
      margin-top: 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      padding: 6px;
    }

    .modal-close:hover { color: var(--fg); }

    .loading, .empty, .error {
      color: var(--muted);
      font-size: 14px;
      padding: 28px 0;
      text-align: center;
    }

    .error { color: var(--danger); }

    /* tao mini */
    .tao-mini {
      position: fixed;
      right: 16px;
      bottom: 24px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      font-family: inherit;
    }

    .tao-mini-trigger {
      position: relative;
      cursor: pointer;
    }

    .tao-mini-img,
    .tao-mini-fallback {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      object-fit: cover;
      background: #1a1a1d;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 28px rgba(0,0,0,.45);
      animation: taoMiniBreathe 3.6s ease-in-out infinite;
      transform-origin: center bottom;
      transition: transform 180ms ease, filter 180ms ease;
      display: block;
    }

    .tao-mini-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
    }

    .tao-mini-trigger:hover .tao-mini-img,
    .tao-mini-trigger:hover .tao-mini-fallback { transform: scale(1.04); }

    .tao-mini-trigger:active .tao-mini-img,
    .tao-mini-trigger:active .tao-mini-fallback { transform: scale(.96); }

    .tao-mini-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--accent);
      color: #0a0a0a;
      font-size: 11px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 6px 14px rgba(0,0,0,.35);
      transform: scale(1);
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .tao-mini-badge.hidden {
      opacity: 0;
      transform: scale(.5);
      pointer-events: none;
    }

    .tao-mini-menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(20,20,24,.96);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 8px;
      min-width: 190px;
      box-shadow: 0 16px 34px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 1;
      transform: translateY(0) scale(1);
      transform-origin: bottom right;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .tao-mini-menu.hidden {
      opacity: 0;
      transform: translateY(8px) scale(.96);
      pointer-events: none;
    }

    .tao-mini-action {
      border: 0;
      border-radius: 10px;
      padding: 11px 13px;
      text-align: left;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      background: rgba(255,255,255,.05);
      color: #f5f5f5;
      cursor: pointer;
      transition: transform 120ms ease, background 140ms ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tao-mini-action:hover { background: rgba(255,255,255,.1); }
    .tao-mini-action:active { transform: scale(.985); }

    @keyframes taoMiniBreathe {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.015); }
      100% { transform: translateY(0) scale(1); }
    }

    body[dir="rtl"] .meta,
    body[dir="rtl"] .addr,
    body[dir="rtl"] .name { text-align: right; }
    body[dir="rtl"] .src-row { flex-direction: row-reverse; }
    body[dir="rtl"] .lang-menu { left: 0; right: auto; }
    body[dir="rtl"] .tao-mini { right: auto; left: 16px; align-items: flex-start; }
    body[dir="rtl"] .tao-mini-menu { transform-origin: bottom left; }
    body[dir="rtl"] .tao-mini-action { text-align: right; }
    body[dir="rtl"] .tao-mini-badge { right: auto; left: -2px; }

    @media (max-width: 420px) {
      .brand h1 { font-size: 30px; }
      .name { font-size: 22px; }
      .card { padding: 18px; }
      .tao-mini { bottom: 18px; right: 14px; }
    }
  </style>
</head>

      <div class="tao-mini-fallback" id="taoMiniFallback">🐒</div>
      <span id="taoMiniBadge" class="tao-mini-badge hidden">•</span>
    </div>
  </div>

    function detectLang() {
      try {
        const saved = localStorage.getItem("weetao.lang");
        if (saved && T[saved]) return saved;
      } catch (_) {}
      const nav = (navigator.language || "en").toLowerCase();
      const base = nav.split("-")[0];
      return T[base] ? base : "en";
    }

    function t(key) {
      return (T[lang] && T[lang][key]) || (T.en && T.en[key]) || key;
    }

    function isRTL() {
      return lang === "ar";
    }

    function distKm(a, b) {
      const toRad = x => x * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const aa = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
    }

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function deriveTags(place) {
      if (Array.isArray(place.tags) && place.tags.length) return place.tags;
      const c = (place.cuisine || "").toLowerCase();
      const tags = new Set();

      if (/brasserie|bouillon|bistro|bistrot|café/.test(c)) {
        tags.add("brasserie");
        tags.add("restaurant");
      }
      if (/seafood|fruits de mer|poisson|hu[iî]tre|oyster|clam/.test(c)) {
        tags.add("seafood");
        tags.add("brasserie");
        tags.add("restaurant");
      }
      if (/gastronomique|gastronomie|michelin|fine dining|contemporary/.test(c)) {
        tags.add("gastronomie");
        tags.add("restaurant");
      }
      if (/sandwich|burger|pizza|pizzeria|fast|kebab|taco|street/.test(c)) {
        tags.add("fastfood");
      }
      if (/brunch/.test(c)) tags.add("brunch");
      if (/breakfast|petit[- ]?dej|coffee|café/.test(c)) tags.add("breakfast");

      if (/vietnamese|thai|japanese|korean|chinese|indian|asian|sushi|ramen|pho/.test(c)) {
        tags.add("world"); tags.add("asie");
      }
      if (/mexican|peruvian|argentin|brazil|latino|taco/.test(c)) {
        tags.add("world"); tags.add("latino");
      }
      if (/american|us|steakhouse|burger|bbq/.test(c)) {
        tags.add("world"); tags.add("us");
      }
      if (/magreb|maghreb|moroccan|marocain|tunisian|tunisie|algerian|alg[eé]rien|couscous/.test(c)) {
        tags.add("world"); tags.add("magrebin");
      }
      if (/italian|italien|pizza|pasta|trattoria/.test(c)) {
        tags.add("world"); tags.add("italien");
      }
      if (/portugal|portuguese|portugais/.test(c)) {
        tags.add("world"); tags.add("portugal");
      }
      if (/greek|grec/.test(c)) {
        tags.add("world"); tags.add("greek");
      }

      if (!tags.size) tags.add("restaurant");
      return Array.from(tags);
    }

    function placeTags(p) {
      return p.__tags || (p.__tags = deriveTags(p));
    }

    function matchesCategory(p) {
      if (filterCategory === "all") return true;
      const tags = placeTags(p);
      if (filterCategory === "world") {
        if (!tags.includes("world")) return false;
        if (filterSub === "all") return true;
        return tags.includes(filterSub);
      }
      return tags.includes(filterCategory);
    }

    function filteredPlaces() {
      let out = places.slice();

      if (filterDistrict === "around") {
        if (!userCoords) return [];
        out = out
          .map(p => ({ ...p, _d: distKm(userCoords, { lat: p.lat, lng: p.lng }) }))
          .sort((a, b) => a._d - b._d)
          .slice(0, 10);
      } else if (filterDistrict !== "all") {
        out = out.filter(p => p.district === filterDistrict);
      }

      out = out.filter(matchesCategory);
      return out;
    }

    function sortedSources(sources) {
      if (!sources) return [];
      const rows = [];
      Object.keys(sources).forEach(k => {
        const s = sources[k];
        if (!s || typeof s.rating !== "number") return;
        if (s.via) {
          const origin = sources[s.via];
          if (!origin || typeof origin.rating !== "number") return;
          if (s.rating !== origin.rating) return;
        }
        rows.push({
          key: k,
          rating: s.rating,
          reviews: typeof s.reviews === "number" ? s.reviews : null,
          via: s.via || null
        });
      });
      rows.sort((a, b) => {
        const av = a.reviews ?? -1;
        const bv = b.reviews ?? -1;
        if (bv !== av) return bv - av;
        return b.rating - a.rating;
      });
      return rows;
    }

    function sourceRowsHtml(place) {
      const rows = sortedSources(place.sources);
      if (!rows.length) return `<div class="src-empty">${escapeHtml(t("no_data"))}</div>`;

      return `<div class="sources">${
        rows.map((s, i) => `
          <div class="src-row ${i === 0 ? "top" : ""}">
            <div class="src-name">
              ${escapeHtml(SRC_LABEL[s.key] || s.key)}
              ${s.via ? `<span class="via">via ${escapeHtml(s.via)}</span>` : ``}
            </div>
            <div class="src-val">
              <span class="rating">★ ${s.rating.toFixed(1)}</span>
              ${s.reviews != null ? `<span class="count">${s.reviews} avis</span>` : ``}
            </div>
          </div>
        `).join("")
      }</div>`;
    }

    function cardHtml(place) {
      return `
        <article class="card">
          <div class="head">
            <div class="name">${escapeHtml(place.name)}</div>
            <div class="meta">${escapeHtml(place.cuisine || "")} • ${escapeHtml(place.district || "")}</div>
            <div class="addr">${escapeHtml(place.address || "")}</div>
          </div>

          ${sourceRowsHtml(place)}

          <button class="cta" data-address="${escapeHtml(place.address || "")}">
            <span>📍</span>
            <span>${escapeHtml(t("cta"))}</span>
          </button>
        </article>
      `;
    }

    function renderList() {

    function chipHtml(key, label, active, sub = false) {
      const cls = sub ? "chip-sub" : "chip";
      const a = active ? " active" : "";
      return `<button type="button" class="${cls}${a}" data-key="${escapeHtml(key)}">${escapeHtml(label)}</button>`;

    function renderDistricts() {
      const chips = [];
      chips.push(chipHtml("all", t("all"), filterDistrict === "all"));
      chips.push(chipHtml("around", `📍 ${t("around")}`, filterDistrict === "around"));

    function renderCategories() {
      const chips = [chipHtml("all", t("all"), filterCategory === "all")];
      CATEGORIES.forEach(c => {
        chips.push(chipHtml(c.key, t(c.i18n), filterCategory === c.key));

      filtersCategoryEl.querySelectorAll(".chip").forEach(el => {

          filterCategory = key;
          filterSub = "all";
          renderAll();

      const world = CATEGORIES.find(c => c.key === "world");
      if (filterCategory === "world" && world && Array.isArray(world.sub)) {
        const subs = [chipHtml("all", t("all"), filterSub === "all", true)];

      }
    }

    function applyLangUi() {
      document.documentElement.lang = lang;
      document.body.dir = isRTL() ? "rtl" : "ltr";

      document.getElementById("title").textContent = t("title");
      document.getElementById("subtitle").textContent = t("subtitle");
      document.getElementById("rowLabelDistrict").textContent = t("districts");
      document.getElementById("rowLabelCategory").textContent = t("categories");
      document.getElementById("loading").textContent = t("loading");
      mapsModalTitle.textContent = t("maps_title");
      mapsModalClose.textContent = t("close");
      taoActionScan.lastElementChild.textContent = t("scanner");
      taoActionAround.lastElementChild.textContent = `📍 ${t("around")}`.replace("📍 ", "");
      taoActionTop.lastElementChild.textContent = t("top");

      const current = LANGS.find(l => l.key === lang) || LANGS[1];
      langFlag.textContent = current.flag;
      langCode.textContent = current.code;

      renderLangMenu();
    }

    function renderLangMenu() {
      langMenu.innerHTML = LANGS.map(l => `
        <div class="lang-item ${l.key === lang ? "active" : ""}" data-key="${l.key}" role="option">
          <span class="flag">${l.flag}</span>
          <span class="name">${l.name}</span>
        </div>
      `).join("");

      langMenu.querySelectorAll(".lang-item").forEach(el => {
        el.addEventListener("click", () => {
          lang = el.dataset.key;
          try { localStorage.setItem("weetao.lang", lang); } catch (_) {}
          closeLangMenu();
          renderAll();
        });
      });
    }

    function openLangMenu() {
      langRoot.classList.add("open");
      langBtn.setAttribute("aria-expanded", "true");
    }

    function closeLangMenu() {
      langRoot.classList.remove("open");
      langBtn.setAttribute("aria-expanded", "false");
    }

    function detectPlatform() {
      const ua = (navigator.userAgent || "").toLowerCase();
      if (/iphone|ipad|ipod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)) {
        return "ios";
      }
      if (/android/.test(ua)) return "android";
      return "desktop";
    }

    function openMaps(address, target) {
      const q = encodeURIComponent(address || "");
      if (!q) return;
      if (target === "apple") {
        window.open(`https://maps.apple.com/?q=${q}`, "_blank");
      } else {
        window.open(`https://www.google.com/maps/search/?api=1&query=${q}`, "_blank");
      }
    }

    function openMapsModal(address) {
      pendingMapsAddress = address || "";
      mapsModal.classList.add("open");
      mapsModalApple.style.display = detectPlatform() === "ios" ? "" : "none";
    }

    function closeMapsModal() {
      mapsModal.classList.remove("open");
      pendingMapsAddress = "";
    }

    function bindCtaHandlers() {
      document.querySelectorAll(".cta").forEach(btn => {
        btn.addEventListener("click", () => {
          const address = btn.dataset.address || "";
          openMapsModal(address);
        });
      });
    }

    function startAroundMe() {
      if (!navigator.geolocation) {
        alert(t("geo_denied"));
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          userCoords = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };
          filterDistrict = "around";
          renderAll();
        },
        () => {
          alert(t("geo_denied"));
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    function startScan() {
      startAroundMe();
    }

    function renderAll() {
      applyLangUi();
      renderDistricts();
      renderCategories();
      renderList();
    }

    function toggleTaoMenu() {
      taoMiniMenu.classList.toggle("hidden");
      if (!taoMiniMenu.classList.contains("hidden")) hideTaoMiniBadge();
    }

    function closeTaoMenu() {
      taoMiniMenu.classList.add("hidden");
    }

    function showTaoMiniBadge(content = "•") {
      taoMiniBadge.textContent = content;
      taoMiniBadge.classList.remove("hidden");
    }

    function hideTaoMiniBadge() {
      taoMiniBadge.classList.add("hidden");
    }

    taoMiniTrigger.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleTaoMenu();
    });

    document.addEventListener("click", (e) => {
      if (!taoMini.contains(e.target)) closeTaoMenu();
      if (!langRoot.contains(e.target)) closeLangMenu();
    });

    taoActionScan.addEventListener("click", () => {
      closeTaoMenu();
      hideTaoMiniBadge();
      startScan();
    });

    taoActionAround.addEventListener("click", () => {
      closeTaoMenu();
      hideTaoMiniBadge();
      startAroundMe();
    });

    taoActionTop.addEventListener("click", () => {
      closeTaoMenu();
      hideTaoMiniBadge();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    langBtn.addEventListener("click", () => {
      if (langRoot.classList.contains("open")) closeLangMenu();
      else openLangMenu();
    });

    mapsModalGoogle.addEventListener("click", () => {
      openMaps(pendingMapsAddress, "google");
      closeMapsModal();
    });

    mapsModalApple.addEventListener("click", () => {
      openMaps(pendingMapsAddress, "apple");
      closeMapsModal();
    });

    mapsModalClose.addEventListener("click", closeMapsModal);
    mapsModal.addEventListener("click", (e) => {
      if (e.target === mapsModal) closeMapsModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeMapsModal();
        closeTaoMenu();
        closeLangMenu();
      }
    });

    taoMiniImg.addEventListener("error", () => {
      taoMiniImg.style.display = "none";
      taoMiniFallback.style.display = "flex";
    });

    function initData() {
      try {
        const raw = document.getElementById("places-data").textContent;
        places = JSON.parse(raw);
      } catch (e) {
        console.error("Embedded data parse failed:", e);
        listEl.innerHTML = `<div class="error">Data error</div>`;
        places = [];
      }
    }

    let badgeShown = false;
    let scrollArmed = true;

    setTimeout(() => {
      if (!badgeShown && taoMiniMenu.classList.contains("hidden")) {
        showTaoMiniBadge("•");
        badgeShown = true;
      }
    }, 1800);

    window.addEventListener("scroll", () => {
      if (!scrollArmed) return;
      if (window.scrollY > 500) {
        scrollArmed = false;
        if (!badgeShown && taoMiniMenu.classList.contains("hidden")) {
          showTaoMiniBadge("•");
          badgeShown = true;
        }
      }
    }, { passive: true });

    initData();
    renderAll();

    window.taoMini = {
      showBadge: showTaoMiniBadge,
      hideBadge: hideTaoMiniBadge,
      openMenu: toggleTaoMenu,
      closeMenu: closeTaoMenu
    };
  </script>
</body>
</html>
